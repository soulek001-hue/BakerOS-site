<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BakerOS — Early Access</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="logo-icon.png" />
</head>

<body>

<header class="site-header">
  <div class="logo">
    <img src="logo-icon.png" alt="BakerOS logo" />
    <span>BakerOS</span>
  </div>
</header>

<main class="container">

  <img src="logo.png" class="hero-logo" alt="BakerOS">

  <h1>Run Your Bakery. Grow Your Business.</h1>

  <p>
    Manage orders, customers, inventory, and marketing—all from your phone.
  </p>

  <h2>🚀 Join Early Access</h2>

<p class="cta-text">
  Join <strong>100+ bakers</strong> getting early access to BakerOS
</p>

<p class="cta-subtext">
  Spots are limited for the first release
</p>

  <!-- FORM -->
  <form action="https://formspree.io/f/xlgzrovp" method="POST" class="form">
    
    <input type="hidden" name="_redirect" value="https://bakeros.app/thank-you">

    <input type="text" name="name" placeholder="Your Name" required>

    <input type="email" name="email" placeholder="Email Address" required>

    <input type="tel" name="phone" placeholder="Phone Number (Optional)">

    <select name="baker_type">
      <option value="">What do you bake?</option>
      <option>Cookies</option>
      <option>Cakes</option>
      <option>Both</option>
      <option>Other</option>
    </select>

    <select name="struggle" required>
      <option value="">Biggest struggle?</option>
      <option>Keeping track of orders</option>
      <option>Managing customers</option>
      <option>Managing inventory</option>
      <option>Getting more customers</option>
      <option>Branding / website</option>
    </select>

    <button type="submit" class="btn">
      Join Early Access
    </button>
    <p class="trust-text">
  No spam. Just early access + launch perks.
</p>

  </form>

</main>

</body>
</html>
